services:
  blogify-web:
    image: ghcr.io/${OWNER:?OWNER must be set}/blogify-web:${IMAGE_TAG:-latest}

    restart: unless-stopped

    networks:
      - web

    volumes:
      - sqlite-data:/app/data
      - uploads-data:/app/wwwroot/uploads
      - app-keys:/app/keys

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__blogdb: "Data Source=/app/data/blogify.db;Default Timeout=30"
      Analytics__IpHashSalt: ${IP_HASH_SALT}
      FeedbackHub__PublicKey: ${FEEDBACK_HUB_PUBLIC_KEY:-}
      Email__Enabled: ${EMAIL_ENABLED:-true}
      Email__PublicBaseUrl: ${EMAIL_PUBLIC_BASE_URL:?EMAIL_PUBLIC_BASE_URL must be set}
      Email__FromAddress: ${EMAIL_FROM_ADDRESS:?EMAIL_FROM_ADDRESS must be set}
      Email__FromName: ${EMAIL_FROM_NAME:-Blogify}
      Email__QueueCapacity: ${EMAIL_QUEUE_CAPACITY:-100}
      Smtp__Host: ${SMTP_HOST:?SMTP_HOST must be set}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__Username: ${SMTP_USERNAME:?SMTP_USERNAME must be set}
      Smtp__Password: ${SMTP_PASSWORD:?SMTP_PASSWORD must be set}
      Smtp__UseSsl: ${SMTP_USE_SSL:-false}

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"

      - "traefik.http.routers.blogify-web.rule=Host(`blogify.com.tr`) || Host(`www.blogify.com.tr`) || Host(`*.blogify.com.tr`)"
      - "traefik.http.routers.blogify-web.entrypoints=websecure"
      - "traefik.http.routers.blogify-web.tls=true"

      - "traefik.http.services.blogify-web.loadbalancer.server.port=8080"

volumes:
  sqlite-data:
  uploads-data:
  app-keys:

networks:
  web:
    external: true
