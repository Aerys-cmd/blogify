services:
  blogify-web:
    image: ghcr.io/${OWNER:?OWNER must be set}/blogify-web:${IMAGE_TAG:-latest}

    restart: unless-stopped

    networks:
      - web

    volumes:
      - sqlite-data:/app/data
      - uploads-data:/app/wwwroot/uploads
      - app-keys:/app/keys

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__blogdb: "Data Source=/app/data/blogify.db;Default Timeout=30"
      Analytics__IpHashSalt: ${IP_HASH_SALT}

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.blogify.rule=Host(`blog.lunavex.com`)"
      - "traefik.http.routers.blogify.entrypoints=websecure"

      - "traefik.http.services.blogify.loadbalancer.server.port=8080"

volumes:
  sqlite-data:
  uploads-data:
  app-keys:

networks:
  web:
    external: true