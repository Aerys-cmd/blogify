services:
  traefik:
    image: traefik:v3.6.1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik-certs:/letsencrypt
    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
    networks:
      - web
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped

  blogify-web:
    image: ghcr.io/${OWNER:?OWNER must be set}/blogify-web:${IMAGE_TAG:-latest}
    depends_on:
      - postgres
    networks:
      - web
      - internal
    volumes:
      - uploads-data:/app/wwwroot/uploads
      - app-keys:/app/keys
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__blogdb: "Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Analytics__IpHashSalt: ${IP_HASH_SALT}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"

      # HTTP → HTTPS redirect
      - "traefik.http.routers.blogify-http.entrypoints=web"
      - "traefik.http.routers.blogify-http.rule=HostRegexp(`[a-z0-9]([a-z0-9-]*[a-z0-9])?\\.blog\\.lunavex\\.com`) || Host(`blog.lunavex.com`) || Host(`www.blog.lunavex.com`)"
      - "traefik.http.routers.blogify-http.middlewares=redirect-to-https"
      - "traefik.http.routers.blogify-http.service=noop@internal"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

      # Root domain router
      - "traefik.http.routers.blogify-root.entrypoints=websecure"
      - "traefik.http.routers.blogify-root.rule=Host(`blog.lunavex.com`) || Host(`www.blog.lunavex.com`)"
      - "traefik.http.routers.blogify-root.tls=true"
      - "traefik.http.routers.blogify-root.tls.certresolver=letsencrypt"
      - "traefik.http.routers.blogify-root.priority=120"
      - "traefik.http.routers.blogify-root.service=blogify-svc"

      # Tenant subdomains router
      - "traefik.http.routers.blogify-tenants.entrypoints=websecure"
      - "traefik.http.routers.blogify-tenants.rule=HostRegexp(`[a-z0-9]([a-z0-9-]*[a-z0-9])?\\.blog\\.lunavex\\.com`) && !Host(`www.blog.lunavex.com`) && !Host(`pgadmin.blog.lunavex.com`)"
      - "traefik.http.routers.blogify-tenants.tls=true"
      - "traefik.http.routers.blogify-tenants.tls.certresolver=letsencrypt"
      - "traefik.http.routers.blogify-tenants.priority=100"
      - "traefik.http.routers.blogify-tenants.tls.domains[0].main=blog.lunavex.com"
      - "traefik.http.routers.blogify-tenants.tls.domains[0].sans=*.blog.lunavex.com"
      - "traefik.http.routers.blogify-tenants.service=blogify-svc"

      # Shared service definition
      - "traefik.http.services.blogify-svc.loadbalancer.server.port=8080"
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    networks:
      - web
      - internal
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.blog.lunavex.com`)"
      - "traefik.http.routers.pgadmin.tls=true"
      - "traefik.http.routers.pgadmin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.pgadmin.priority=200"
      - "traefik.http.routers.pgadmin.service=pgadmin-svc"
      - "traefik.http.services.pgadmin-svc.loadbalancer.server.port=80"
    restart: unless-stopped

volumes:
  traefik-certs:
  postgres-data:
  uploads-data:
  app-keys:
  pgadmin-data:

networks:
  web:
    external: true
  internal:
    internal: true
