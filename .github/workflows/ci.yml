name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore Blogify.sln

      - name: Build
        run: dotnet build Blogify.Web/Blogify.Web.csproj -c Release --no-restore

      - name: Test
        run: dotnet test Blogify.Tests/Blogify.Tests.csproj -c Release --no-restore
